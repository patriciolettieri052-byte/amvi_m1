<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* TEMPLATE: foto_full_texto_minimo — inmobiliaria / editorial aspiracional
     Variables: {{BG}} {{TEXT_COLOR}} {{ACCENT}} {{FONT}} {{TITULO}} {{SUBTITULO}} {{CTA}} {{FOTO_URL}} */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; }
  .canvas {
    width:1080px; height:1080px; position:relative;
    font-family:'{{FONT}}', serif;
    background:{{BG}};
  }
  .foto { width:100%; height:660px; object-fit:cover; display:block; filter:saturate(0.85); }
  .content { padding:70px 80px; position:relative; }
  .divider { width:80px; height:1px; background:{{ACCENT}};
    border-top:1px dotted {{ACCENT}}; margin-bottom:36px; }
  .titulo { font-size:88px; font-weight:400; line-height:0.95;
    color:{{TEXT_COLOR}}; text-transform:uppercase; letter-spacing:8px; }
  .subtitulo { font-size:32px; font-weight:300; color:{{TEXT_COLOR}};
    margin-top:28px; letter-spacing:1px; opacity:0.75; max-width:70%; line-height:1.4; }
  .cta { position:absolute; bottom:70px; right:80px;
    font-size:24px; font-weight:400; color:{{ACCENT}};
    letter-spacing:3px; text-transform:uppercase;
    border-bottom:1px solid {{ACCENT}}; padding-bottom:6px; }
</style>
</head>
<body>
  <div class="canvas">
    <img class="foto" src="{{FOTO_URL}}" />
    <div class="content">
      <div class="divider"></div>
      <div class="titulo">{{TITULO}}</div>
      <div class="subtitulo">{{SUBTITULO}}</div>
      <div class="cta">{{CTA}}</div>
    </div>
  </div>
</body>
</html>
