<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  /* TEMPLATE: producto_centrado_crema — crochet / artesanal calido
     Variables: {{BG}} {{TEXT_COLOR}} {{ACCENT}} {{FONT}} {{TITULO}} {{SUBTITULO}} {{CTA}} {{FOTO_URL}} {{LOGO_URL}} */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; }
  .canvas {
    width:1080px; height:1080px; position:relative;
    background:{{BG}};
    font-family:'{{FONT}}', sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:80px 70px;
  }
  .logo { height:54px; margin-bottom:20px; }
  .titulo { font-size:82px; font-weight:700; color:{{TEXT_COLOR}};
    text-align:center; line-height:1.0; margin-bottom:14px; }
  .subtitulo { font-size:30px; font-weight:500; color:{{ACCENT}};
    text-align:center; margin-bottom:36px; }
  .foto-wrap { flex:1; width:100%; display:flex; align-items:center; justify-content:center; }
  .foto { max-width:620px; max-height:520px; object-fit:contain;
    border-radius:24px; }
  .cta { margin-top:36px; background:{{ACCENT}}; color:{{BG}};
    font-size:28px; font-weight:700; padding:16px 44px; border-radius:50px; }
</style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="{{LOGO_URL}}" />
    <div class="titulo">{{TITULO}}</div>
    <div class="subtitulo">{{SUBTITULO}}</div>
    <div class="foto-wrap"><img class="foto" src="{{FOTO_URL}}" /></div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
